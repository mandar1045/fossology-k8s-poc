apiVersion: v1
kind: Secret
metadata:
  name: fossology-db-conf
  namespace: fossology
type: Opaque
stringData:
  # Exact format generated by fossology/docker-entrypoint.sh
  # key=value; (semicolon-delimited, no spaces) as expected by libfossscheduler.c
  Db.conf: |
    dbname=fossology;
    host=fossology-db;
    user=fossy;
    password=fossy;
