apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fossology-config-sync
  namespace: fossology
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fossology-config-sync
  namespace: fossology
subjects:
  - kind: ServiceAccount
    name: fossology-web
    namespace: fossology
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fossology-config-sync
