{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fossology.fullname" . }}-config-sync
  labels:
{{ include "fossology.labels" . | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fossology.fullname" . }}-config-sync
  labels:
{{ include "fossology.labels" . | indent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "fossology.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fossology.fullname" . }}-config-sync
{{- end }}
