{{- if .Values.database.internal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fossology.dbHost" . }}
  labels:
{{ include "fossology.labels" . | indent 4 }}
    app: {{ include "fossology.fullname" . }}-db
spec:
  clusterIP: None
  selector:
    app: {{ include "fossology.fullname" . }}-db
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
{{- end }}
